apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-service
  template:
    metadata:
      labels:
        app: client-service
    spec:
      containers:
        - name: client-service
          image: asha307/client-service:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: default
spec:
  selector:
    app: client-service
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort
